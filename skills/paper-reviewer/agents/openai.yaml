interface:
  display_name: "Paper Reviewer"
  short_description: "Auditable paper review with close-reading ledger, NeurIPS JSON, and concise feedback"
  default_prompt: "When the input is a PDF, render page images first and inspect them directly for layout, typography, figures, tables, charts, and caption alignment. Before scoring, prepare and complete close_reading_audit.jsonl plus coverage_map.json, validate the audit ledger, and use text extraction only as a supplement for dense passages. Then run a ScholarEval-inspired dimension pass that also checks title/abstract discipline, closest-prior-work comparison, and submission-readiness risks when relevant, and produce both a NeurIPS-style review JSON and a concise evidence-linked review summary with prioritized recommendations."
