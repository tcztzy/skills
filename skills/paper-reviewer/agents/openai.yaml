interface:
  display_name: "Paper Reviewer"
  short_description: "Structured paper review with NeurIPS JSON + concise feedback"
  default_prompt: "When the input is a PDF, render page images first and inspect them directly for layout, typography, figures, tables, charts, and caption alignment. Use text extraction only as a supplement for dense passages. Then run a ScholarEval-inspired dimension pass (problem, literature, method, data, analysis, results, writing, visual presentation, citations), and produce both a NeurIPS-style review JSON and a concise evidence-linked review summary with prioritized recommendations."
