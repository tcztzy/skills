[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
select = ["UP", "TID"]
ignore = ["FA100", "FA102"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"__future__.annotations" = { msg = "Do not use from __future__ import annotations in Python 3.10+ code" }
"typing.List" = { msg = "Use list[T]" }
"typing.Dict" = { msg = "Use dict[K, V]" }
"typing.Set" = { msg = "Use set[T]" }
"typing.Tuple" = { msg = "Use tuple[...]" }
"typing.Optional" = { msg = "Use T | None" }
"typing.Union" = { msg = "Use A | B" }
