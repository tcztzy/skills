interface:
  display_name: "Paper Writer"
  short_description: "Draft papers, fill evidence gaps, repair draft-local bibliographies, and audit figure-text alignment"
  default_prompt: "Draft, revise, or scaffold a scientific paper from ideas, summaries, plots, citations, and experiment artifacts. Keep claims grounded in evidence, and when the draft is blocked by a missing but feasible piece of support, actively recommend the smallest decisive supplementary experiment and run simple statistics or lightweight analyses directly when local artifacts already make that possible. Use the bundled bibliography helper only for manuscript-local citation gaps, route Zotero library or collection management elsewhere, compare the closest prior work fairly, keep the title and abstract concise and proportionate, and ensure figure/caption readability, submission-readiness, and LaTeX quality."
