  short_description: "Author, audit, install, convert, and bundle Codex skills"
  default_prompt: "Manage the full skill lifecycle: create or audit SKILL.md files and their scripts/references/assets, validate routing metadata, inventory/install/update skills, convert Claude Code skills into Codex skills, sync sources, build suites, or bootstrap shared runtimes. Ask for the target skill, desired output, and any source or compatibility constraints."
