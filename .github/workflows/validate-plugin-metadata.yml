name: Validate Plugin Metadata

on:
  push:
    paths:
      - ".agents/plugins/marketplace.json"
      - ".claude-plugin/marketplace.json"
      - ".codex-plugin/plugin.json"
      - ".github/workflows/validate-plugin-metadata.yml"
      - "scripts/generate_claude_marketplace.py"
      - "scripts/validate_plugin_metadata.py"
      - "skills/**/SKILL.md"
  pull_request:
    paths:
      - ".agents/plugins/marketplace.json"
      - ".claude-plugin/marketplace.json"
      - ".codex-plugin/plugin.json"
      - ".github/workflows/validate-plugin-metadata.yml"
      - "scripts/generate_claude_marketplace.py"
      - "scripts/validate_plugin_metadata.py"
      - "skills/**/SKILL.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate plugin metadata
        run: python3 scripts/validate_plugin_metadata.py
